<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy! - Host</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .section { display: none; }
    .section.active { display: block; }
    .setup-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
    .setup-title { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: var(--bright-gold); }
    .q-count-badge {
      font-size: 0.75rem; background: rgba(74,222,128,0.2); color: #4ade80;
      padding: 3px 8px; border-radius: 20px; border: 1px solid rgba(74,222,128,0.4);
    }
    .section-heading {
      font-family: 'Oswald', sans-serif; font-size: 0.8rem; color: var(--gold);
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px;
    }
    .player-controls { display: flex; gap: 6px; align-items: center; }
    .host-page .setup-grid .category-row { display: contents; }
    .warn { color: #fbbf24; font-size: 0.85rem; }
    .game-over-notice {
      background: rgba(255,215,0,0.1); border: 2px solid var(--gold);
      border-radius: 8px; padding: 16px; text-align: center; margin-bottom: 16px;
    }
    .dd-wager-panel {
      background: rgba(255,165,0,0.12); border: 1px solid rgba(255,165,0,0.4);
      border-radius: 8px; padding: 14px 16px; margin-bottom: 14px;
    }
    .dd-label {
      font-family: 'Oswald', sans-serif; font-size: 1rem; color: #fbbf24;
      letter-spacing: 0.08em; margin-bottom: 10px;
    }
    .dd-fields { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .dd-fields label { font-size: 0.78rem; color: rgba(255,255,255,0.6); display: block; margin-bottom: 4px; }
    .dd-fields select, .dd-fields input[type="number"] {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 6px; padding: 7px 10px; font-size: 0.9rem;
    }
    .fj-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .fj-modal {
      background: #1a1a2e; border: 2px solid var(--gold); border-radius: 12px;
      padding: 28px 32px; width: 100%; max-width: 520px;
    }
    .fj-modal h2 { font-family: 'Oswald', sans-serif; color: var(--bright-gold); font-size: 1.6rem; margin-bottom: 18px; }
    .fj-modal label { font-size: 0.82rem; color: rgba(255,255,255,0.6); display: block; margin-bottom: 4px; }
    .fj-modal input, .fj-modal textarea {
      width: 100%; box-sizing: border-box; margin-bottom: 14px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 6px; padding: 9px 12px; font-size: 0.95rem;
    }
    .fj-modal textarea { resize: vertical; min-height: 80px; font-family: inherit; }
    .fj-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .fj-host-panel {
      background: rgba(0,50,100,0.3); border: 1px solid rgba(100,150,255,0.3);
      border-radius: 10px; padding: 16px; margin-bottom: 16px;
    }
    .fj-host-panel h3 { font-family: 'Oswald', sans-serif; color: #93c5fd; margin-bottom: 12px; font-size: 1.1rem; }
    .fj-judge-list { display: flex; flex-direction: column; gap: 8px; }
    .fj-judge-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .fj-judge-item.judged-correct { border-color: rgba(74,222,128,0.5); background: rgba(74,222,128,0.08); }
    .fj-judge-item.judged-wrong { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.08); }
    .fj-judge-name { font-weight: 600; }
    .fj-judge-wager { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
    .fj-judge-btns { display: flex; gap: 6px; }
    .timer-settings {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px;
    }
    .timer-settings label { font-size: 0.78rem; color: rgba(255,255,255,0.6); display: block; margin-bottom: 4px; }
    .timer-settings input[type="number"] {
      width: 70px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
      color: white; border-radius: 6px; padding: 6px 8px; font-size: 0.9rem;
    }
    .saved-board-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
    }
    .saved-name { flex: 1; font-weight: 600; }
    .saved-meta { font-size: 0.78rem; color: rgba(255,255,255,0.45); }
  </style>
</head>
<body>
  <div class="host-page">
    <div class="host-header">
      <div class="title">JEOPARDY! <span style="font-size:1rem; color:rgba(255,255,255,0.5);">Host Panel</span></div>
      <div id="room-code-display" class="hidden">
        <div class="room-code-badge">
          <span class="label">Room Code</span>
          <span class="code" id="room-code-text">----</span>
        </div>
      </div>
    </div>

    <div class="host-layout">

      <!-- ==================== SIDEBAR ==================== -->
      <div class="host-sidebar">
        <nav class="host-nav">
          <button class="nav-btn active" id="nav-setup" onclick="showSection('setup')">Board Setup</button>
          <button class="nav-btn" id="nav-game" onclick="showSection('game')" disabled>Game Controls</button>
        </nav>

        <div class="sidebar-section">
          <div class="section-heading">Actions</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn btn-gold btn-sm" onclick="createGame()" id="create-btn">Create Game</button>
            <button class="btn btn-sm" onclick="openBoardUrl()" id="board-btn" disabled>Open Board Display</button>
            <button class="btn btn-sm" onclick="startGame()" id="start-btn" disabled>Start Game</button>
            <button class="btn btn-sm" style="background:rgba(100,150,255,0.2); border-color:rgba(100,150,255,0.4); color:#93c5fd;"
              onclick="openFinalJeopardyModal()" id="fj-btn" disabled>Final Jeopardy</button>
            <button class="btn btn-sm" style="background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.3); color:#f87171;"
              onclick="resetGame()" id="reset-btn" disabled>Reset Game</button>
          </div>
        </div>

        <div class="sidebar-section" id="players-panel" style="display:none;">
          <div class="section-heading">Players <span id="player-count" class="q-count-badge">0</span></div>
          <div id="player-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="section-heading">Timer Settings</div>
          <div class="timer-settings">
            <div>
              <label>Buzz Time (s)</label>
              <input type="number" id="buzz-time-limit" value="30" min="5" max="120">
            </div>
            <div>
              <label>Answer Time (s)</label>
              <input type="number" id="answer-time-limit" value="20" min="5" max="60">
            </div>
          </div>
        </div>
      </div>

      <!-- ==================== MAIN ==================== -->
      <div class="host-main">

        <!-- ===== SETUP SECTION ===== -->
        <div class="section active" id="section-setup">
          <div class="setup-actions">
            <div class="setup-title">Board Builder</div>
            <button class="btn btn-sm" onclick="saveBoard()">Save Board</button>
            <button class="btn btn-sm" onclick="showSaved()">Load Saved</button>
            <button class="btn btn-sm" onclick="clearBoard()">Clear</button>
            <select id="preset-select" onchange="loadPreset(this.value)" style="background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:6px; padding:6px 10px; font-size:0.85rem;">
              <option value="">-- Load Preset --</option>
              <option value="easy">Easy / Family Night</option>
              <option value="medium">Medium / General</option>
              <option value="hard">Hard / Expert</option>
              <option value="college">College Night</option>
            </select>
          </div>

          <!-- Saved boards panel -->
          <div id="saved-panel" class="hidden" style="background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:16px; margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <div class="section-heading" style="margin:0;">Saved Boards</div>
              <button class="btn btn-sm" onclick="hideSaved()">Close</button>
            </div>
            <div id="saved-list"></div>
          </div>

          <div class="setup-grid" id="setup-grid">
            <!-- JS rendered -->
          </div>
        </div>

        <!-- ===== GAME SECTION ===== -->
        <div class="section" id="section-game">

          <!-- Daily Double wager panel -->
          <div id="dd-wager-panel" class="dd-wager-panel hidden">
            <div class="dd-label">Daily Double — Set Wager</div>
            <div class="dd-fields">
              <div style="flex:1; min-width:140px;">
                <label>Who found it?</label>
                <select id="dd-player-select"></select>
              </div>
              <div style="width:110px;">
                <label>Wager ($)</label>
                <input type="number" id="dd-wager-input" min="5" value="200">
              </div>
              <button class="btn btn-gold" onclick="revealDD()">Reveal Clue</button>
            </div>
          </div>

          <!-- Active question panel -->
          <div id="active-q-panel" class="hidden" style="background:rgba(0,0,80,0.4); border:1px solid rgba(100,100,255,0.3); border-radius:10px; padding:16px; margin-bottom:16px;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">
              <div style="flex:1;">
                <div style="font-size:0.75rem; color:var(--gold); margin-bottom:4px;" id="aq-cat"></div>
                <div style="font-size:1.1rem; font-weight:600; margin-bottom:4px;" id="aq-clue"></div>
                <div style="font-size:0.8rem; color:rgba(255,255,255,0.45);">Answer: <span id="aq-answer" style="color:rgba(255,255,255,0.7);"></span></div>
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn" style="background:rgba(74,222,128,0.2); border-color:rgba(74,222,128,0.5); color:#4ade80;" onclick="answerResult(true)">Correct</button>
                <button class="btn" style="background:rgba(239,68,68,0.2); border-color:rgba(239,68,68,0.5); color:#f87171;" onclick="answerResult(false)">Wrong</button>
                <button class="btn btn-sm" onclick="revealAnswer()">Reveal Answer</button>
                <button class="btn btn-sm" onclick="dismissQuestion()">Dismiss</button>
              </div>
            </div>
          </div>

          <!-- Buzz order display -->
          <div id="buzz-panel" class="hidden" style="background:rgba(0,0,0,0.3); border-radius:8px; padding:12px 16px; margin-bottom:16px;">
            <div class="section-heading">Buzz Order</div>
            <div id="buzz-order-list" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
          </div>

          <!-- Final Jeopardy host panel -->
          <div id="fj-host-panel" class="fj-host-panel hidden">
            <h3>Final Jeopardy</h3>
            <div id="fj-phase-wager">
              <div style="margin-bottom:12px; color:rgba(255,255,255,0.7);">
                Wagers received: <strong id="fj-wager-count">0</strong> / <strong id="fj-total-players">0</strong>
              </div>
              <button class="btn btn-gold" onclick="revealFinalClue()">Reveal Final Clue</button>
            </div>
            <div id="fj-phase-judge" class="hidden" style="margin-top:12px;">
              <div style="font-size:0.82rem; color:rgba(255,255,255,0.5); margin-bottom:10px;">Judge each player's answer:</div>
              <div id="fj-judge-list" class="fj-judge-list"></div>
              <button class="btn btn-sm" style="margin-top:14px; background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.3); color:#f87171;" onclick="endGame()">End Game</button>
            </div>
          </div>

          <!-- Game over notice -->
          <div id="game-over-panel" class="hidden">
            <div class="game-over-notice">
              <div style="font-family:'Oswald',sans-serif; font-size:1.5rem; color:var(--bright-gold); margin-bottom:8px;">Game Over!</div>
              <div style="color:rgba(255,255,255,0.7); margin-bottom:14px;">Thanks for playing!</div>
              <button class="btn btn-gold" onclick="resetGame()">Play Again</button>
            </div>
          </div>

          <!-- Mini board -->
          <div class="section-heading">Board</div>
          <div class="mini-board" id="mini-board"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Final Jeopardy setup modal -->
  <div id="fj-modal-overlay" class="fj-modal-overlay hidden">
    <div class="fj-modal">
      <h2>Final Jeopardy Setup</h2>
      <label>Category</label>
      <input type="text" id="fj-cat-input" placeholder="e.g. American History" maxlength="60">
      <label>Clue</label>
      <textarea id="fj-clue-input" placeholder="Enter the Final Jeopardy clue..."></textarea>
      <label>Correct Answer</label>
      <input type="text" id="fj-answer-input" placeholder="e.g. What is the Declaration of Independence?">
      <div class="fj-modal-actions">
        <button class="btn btn-sm" onclick="closeFJModal()">Cancel</button>
        <button class="btn btn-gold" onclick="startFinalJeopardy()">Start Final Jeopardy</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>

              { clue: 'The company that created the first commercial microprocessor', answer: 'What is Intel?' },
              { clue: 'Alan Turing proposed this hypothetical computing machine', answer: 'What is the Turing Machine?' },
            ]
          },
          {
            name: 'Classic Films',
            questions: [
              { clue: 'Orson Welles\' debut film, widely considered the greatest ever', answer: 'What is Citizen Kane?' },
              { clue: 'The director of 2001: A Space Odyssey', answer: 'Who is Stanley Kubrick?' },
              { clue: 'The Italian neorealist film featuring a stolen bicycle', answer: 'What is Bicycle Thieves?' },
              { clue: 'Ingmar Bergman\'s film about Death playing chess', answer: 'What is The Seventh Seal?' },
              { clue: 'The French New Wave movement was led by this director of Breathless', answer: 'Who is Jean-Luc Godard?' },
            ]
          },
          {
            name: 'World Literature',
            questions: [
              { clue: 'The magical realist author of "One Hundred Years of Solitude"', answer: 'Who is Gabriel García Márquez?' },
              { clue: 'Kafka\'s novella about a man who wakes as a giant insect', answer: 'What is The Metamorphosis?' },
              { clue: 'The author of "Things Fall Apart"', answer: 'Who is Chinua Achebe?' },
              { clue: 'Tolstoy\'s epic novel set during the Napoleonic Wars', answer: 'What is War and Peace?' },
              { clue: 'The Japanese author of "Norwegian Wood"', answer: 'Who is Haruki Murakami?' },
            ]
          },
          {
            name: 'Economics & Finance',
            questions: [
              { clue: 'The term for the tendency of markets to self-correct', answer: 'What is the invisible hand?' },
              { clue: 'Black-Scholes is a model for pricing these financial instruments', answer: 'What are options?' },
              { clue: 'The economist who developed the theory of comparative advantage', answer: 'Who is David Ricardo?' },
              { clue: 'A market dominated by a few large sellers', answer: 'What is an oligopoly?' },
              { clue: 'The "paradox of thrift" is associated with this economist', answer: 'Who is Keynes?' },
            ]
          },
          {
            name: 'Philosophy & Ethics',
            questions: [
              { clue: 'Kant\'s universal moral law is called this', answer: 'What is the Categorical Imperative?' },
              { clue: 'The thought experiment involving a runaway trolley', answer: 'What is the Trolley Problem?' },
              { clue: 'Nietzsche declared this about God', answer: 'What is "God is dead"?' },
              { clue: 'The philosophical view that only the mind exists', answer: 'What is idealism?' },
              { clue: 'Sartre\'s claim that "existence precedes" this', answer: 'What is essence?' },
            ]
          },
        ]
      }
    };

    // ==================== BOARD BUILDER ====================

    let boardData = null;

    function buildSetupGrid() {
      const grid = document.getElementById('setup-grid');
      grid.innerHTML = '';

      // Category headers
      for (let c = 0; c < NUM_CATS; c++) {
        const div = document.createElement('div');
        div.className = 'category-header-cell';
        div.innerHTML = `
          <div class="cat-label">Category ${c + 1}</div>
          <input type="text" class="cat-name-input" id="cat-name-${c}" placeholder="Category name" maxlength="30">
        `;
        grid.appendChild(div);
      }

      // Question rows
      VALUES.forEach((val, r) => {
        for (let c = 0; c < NUM_CATS; c++) {
          const div = document.createElement('div');
          div.className = 'q-cell';
          div.innerHTML = `
            <div class="q-value">$${val}</div>
            <input type="text" class="q-clue-input" id="clue-${c}-${r}" placeholder="Clue" maxlength="300">
            <input type="text" class="q-answer-input" id="answer-${c}-${r}" placeholder="Answer" maxlength="200">
            <label class="dd-check-label">
              <input type="checkbox" id="dd-${c}-${r}" onchange="handleDDChange(${c}, ${r})"> Daily Double
            </label>
          `;
          grid.appendChild(div);
        }
      });
    }

    function handleDDChange(catIdx, qIdx) {
      if (document.getElementById(`dd-${catIdx}-${qIdx}`).checked) {
        // Uncheck all others
        for (let c = 0; c < NUM_CATS; c++) {
          for (let r = 0; r < VALUES.length; r++) {
            if (c !== catIdx || r !== qIdx) {
              const el = document.getElementById(`dd-${c}-${r}`);
              if (el) el.checked = false;
            }
          }
        }
      }
    }

    function getBoardData() {
      const categories = [];
      for (let c = 0; c < NUM_CATS; c++) {
        const name = document.getElementById(`cat-name-${c}`).value.trim() || `Category ${c + 1}`;
        const questions = [];
        VALUES.forEach((val, r) => {
          const clue = document.getElementById(`clue-${c}-${r}`).value.trim();
          const answer = document.getElementById(`answer-${c}-${r}`).value.trim();
          const dailyDouble = document.getElementById(`dd-${c}-${r}`).checked;
          questions.push({ clue: clue || '(empty)', answer: answer || '(none)', value: val, answered: false, dailyDouble });
        });
        categories.push({ name, questions });
      }
      return { categories };
    }

    function loadBoardData(data) {
      data.categories.forEach((cat, c) => {
        if (c >= NUM_CATS) return;
        const nameEl = document.getElementById(`cat-name-${c}`);
        if (nameEl) nameEl.value = cat.name || '';
        cat.questions.forEach((q, r) => {
          if (r >= VALUES.length) return;
          const clueEl = document.getElementById(`clue-${c}-${r}`);
          const answerEl = document.getElementById(`answer-${c}-${r}`);
          const ddEl = document.getElementById(`dd-${c}-${r}`);
          if (clueEl) clueEl.value = q.clue || '';
          if (answerEl) answerEl.value = q.answer || '';
          if (ddEl) ddEl.checked = q.dailyDouble || false;
        });
      });
    }

    function loadPreset(key) {
      if (!key || !PRESETS[key]) return;
      loadBoardData(PRESETS[key]);
      document.getElementById('preset-select').value = '';
    }

    function clearBoard() {
      buildSetupGrid();
    }

    // ==================== SAVE / LOAD ====================

    function saveBoard() {
      const name = prompt('Name for this board?');
      if (!name) return;
      const boards = JSON.parse(localStorage.getItem('jeopardy-boards') || '[]');
      boards.push({ name, data: getBoardData(), saved: new Date().toLocaleDateString() });
      localStorage.setItem('jeopardy-boards', JSON.stringify(boards));
      alert('Board saved!');
    }

    function showSaved() {
      const boards = JSON.parse(localStorage.getItem('jeopardy-boards') || '[]');
      const panel = document.getElementById('saved-panel');
      const list = document.getElementById('saved-list');
      if (!boards.length) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.4); font-size:0.9rem;">No saved boards yet.</div>';
      } else {
        list.innerHTML = boards.map((b, i) => `
          <div class="saved-board-item">
            <div>
              <div class="saved-name">${escHtml(b.name)}</div>
              <div class="saved-meta">${b.saved || ''}</div>
            </div>
            <div style="display:flex; gap:6px;">
              <button class="btn btn-sm btn-gold" onclick="loadSaved(${i})">Load</button>
              <button class="btn btn-sm" style="border-color:rgba(239,68,68,0.4); color:#f87171;" onclick="deleteSaved(${i})">Delete</button>
            </div>
          </div>
        `).join('');
      }
      panel.classList.remove('hidden');
    }

    function hideSaved() {
      document.getElementById('saved-panel').classList.add('hidden');
    }

    function loadSaved(i) {
      const boards = JSON.parse(localStorage.getItem('jeopardy-boards') || '[]');
      if (boards[i]) {
        loadBoardData(boards[i].data);
        hideSaved();
      }
    }

    function deleteSaved(i) {
      const boards = JSON.parse(localStorage.getItem('jeopardy-boards') || '[]');
      boards.splice(i, 1);
      localStorage.setItem('jeopardy-boards', JSON.stringify(boards));
      showSaved();
    }

    // ==================== GAME MANAGEMENT ====================

    function createGame() {
      boardData = getBoardData();
      socket.emit('create-game', boardData, (res) => {
        if (res.error) { alert(res.error); return; }
        gameCode = res.code;
        document.getElementById('room-code-text').textContent = gameCode;
        document.getElementById('room-code-display').classList.remove('hidden');
        document.getElementById('board-btn').disabled = false;
        document.getElementById('start-btn').disabled = false;
        document.getElementById('fj-btn').disabled = false;
        document.getElementById('reset-btn').disabled = false;
        document.getElementById('create-btn').textContent = 'Recreate Game';
        document.getElementById('players-panel').style.display = '';
        showSection('game');
        renderMiniBoard();
      });
    }

    function openBoardUrl() {
      if (!gameCode) return;
      window.open(`/board.html?code=${gameCode}`, '_blank');
    }

    function startGame() {
      socket.emit('start-game');
      gameState = 'playing';
    }

    function resetGame() {
      const fresh = getBoardData();
      socket.emit('reset-game', fresh);
      gameState = 'playing';
      activeQuestion = null;
      document.getElementById('active-q-panel').classList.add('hidden');
      document.getElementById('buzz-panel').classList.add('hidden');
      document.getElementById('dd-wager-panel').classList.add('hidden');
      document.getElementById('fj-host-panel').classList.add('hidden');
      document.getElementById('game-over-panel').classList.add('hidden');
      renderMiniBoard();
    }

    // ==================== MINI BOARD ====================

    function renderMiniBoard() {
      const grid = document.getElementById('mini-board');
      grid.innerHTML = '';
      if (!boardData) return;

      // Headers
      boardData.categories.forEach(cat => {
        const d = document.createElement('div');
        d.className = 'mini-cat';
        d.textContent = cat.name;
        grid.appendChild(d);
      });

      // Cells
      VALUES.forEach((val, r) => {
        boardData.categories.forEach((cat, c) => {
          const q = cat.questions[r];
          const d = document.createElement('div');
          d.className = 'mini-cell' + (q?.answered ? ' answered' : '');
          d.innerHTML = `<span>$${val}</span>` + (q?.dailyDouble ? '<span class="dd-star">DD</span>' : '');
          if (!q?.answered) {
            const buzzLimit = parseInt(document.getElementById('buzz-time-limit').value) || 30;
            const ansLimit = parseInt(document.getElementById('answer-time-limit').value) || 20;
            d.onclick = () => selectQuestion(c, r, buzzLimit, ansLimit);
          }
          grid.appendChild(d);
        });
      });
    }

    function selectQuestion(catIndex, qIndex, buzzTimeLimit, answerTimeLimit) {
      socket.emit('select-question', { catIndex, qIndex, buzzTimeLimit, answerTimeLimit });
    }

    // ==================== ACTIVE QUESTION ====================

    function showActiveQuestion(q) {
      activeQuestion = q;
      document.getElementById('aq-cat').textContent = `${q.category} — $${q.value}${q.dailyDouble ? ' (Daily Double)' : ''}`;
      document.getElementById('aq-clue').textContent = q.clue;
      document.getElementById('aq-answer').textContent = q.answer;
      document.getElementById('active-q-panel').classList.remove('hidden');

      if (q.dailyDouble) {
        populateDDPlayerSelect();
        document.getElementById('dd-wager-panel').classList.remove('hidden');
      } else {
        document.getElementById('dd-wager-panel').classList.add('hidden');
      }
    }

    function populateDDPlayerSelect() {
      const sel = document.getElementById('dd-player-select');
      sel.innerHTML = currentPlayers.map(p =>
        `<option value="${p.id}">${escHtml(p.name)} ($${p.score})</option>`
      ).join('');
    }

    function revealDD() {
      const playerId = document.getElementById('dd-player-select').value;
      const wager = parseInt(document.getElementById('dd-wager-input').value) || 200;
      socket.emit('dd-reveal', { playerId, wager });
      document.getElementById('dd-wager-panel').classList.add('hidden');
    }

    function answerResult(correct) {
      socket.emit('answer-result', { correct });
    }

    function revealAnswer() {
      socket.emit('reveal-answer');
    }

    function dismissQuestion() {
      socket.emit('dismiss-question');
    }

    function closeQuestionUI() {
      activeQuestion = null;
      document.getElementById('active-q-panel').classList.add('hidden');
      document.getElementById('buzz-panel').classList.add('hidden');
      document.getElementById('dd-wager-panel').classList.add('hidden');
      if (boardData) {
        socket.emit('sync-board', null); // no-op, just refresh mini board from server state
      }
    }

    // ==================== FINAL JEOPARDY ====================

    function openFinalJeopardyModal() {
      document.getElementById('fj-modal-overlay').classList.remove('hidden');
    }

    function closeFJModal() {
      document.getElementById('fj-modal-overlay').classList.add('hidden');
    }

    function startFinalJeopardy() {
      const category = document.getElementById('fj-cat-input').value.trim();
      const clue = document.getElementById('fj-clue-input').value.trim();
      const answer = document.getElementById('fj-answer-input').value.trim();
      if (!category || !clue || !answer) { alert('Please fill in all Final Jeopardy fields.'); return; }
      closeFJModal();
      socket.emit('start-final-jeopardy', { category, clue, answer });
    }

    function showFJPanel(players) {
      fjPlayers = players.filter(p => p.score > 0);
      fjWagerCount = 0;
      document.getElementById('fj-total-players').textContent = Object.keys(currentPlayers).length || players.length;
      document.getElementById('fj-wager-count').textContent = 0;
      document.getElementById('fj-host-panel').classList.remove('hidden');
      document.getElementById('fj-phase-wager').classList.remove('hidden');
      document.getElementById('fj-phase-judge').classList.add('hidden');
    }

    function revealFinalClue() {
      socket.emit('reveal-final-clue');
      buildJudgeList();
      document.getElementById('fj-phase-wager').classList.add('hidden');
      document.getElementById('fj-phase-judge').classList.remove('hidden');
    }

    function buildJudgeList() {
      const list = document.getElementById('fj-judge-list');
      list.innerHTML = currentPlayers.map(p => `
        <div class="fj-judge-item" id="fj-judge-${p.id}">
          <div>
            <div class="fj-judge-name">${escHtml(p.name)}</div>
            <div class="fj-judge-wager">Wager TBD</div>
          </div>
          <div class="fj-judge-btns">
            <button class="btn btn-sm" style="background:rgba(74,222,128,0.2); border-color:rgba(74,222,128,0.5); color:#4ade80;"
              onclick="judgeFJ('${p.id}', true)">Correct</button>
            <button class="btn btn-sm" style="background:rgba(239,68,68,0.2); border-color:rgba(239,68,68,0.5); color:#f87171;"
              onclick="judgeFJ('${p.id}', false)">Wrong</button>
          </div>
        </div>
      `).join('');
    }

    function judgeFJ(playerId, correct) {
      socket.emit('final-answer-result', { playerId, correct });
      const item = document.getElementById(`fj-judge-${playerId}`);
      if (item) {
        item.classList.add(correct ? 'judged-correct' : 'judged-wrong');
        item.querySelectorAll('button').forEach(b => b.disabled = true);
      }
    }

    function endGame() {
      socket.emit('end-game');
    }

    // ==================== PLAYER LIST ====================

    function updatePlayerList(players) {
      currentPlayers = players;
      document.getElementById('player-count').textContent = players.length;
      const list = document.getElementById('player-list');
      if (!players.length) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.35); font-size:0.85rem;">No players yet...</div>';
        return;
      }
      list.innerHTML = players.map(p => `
        <div class="player-list-item">
          <div>
            <div class="player-item-name">${escHtml(p.name)}</div>
            <div class="player-item-score ${p.score < 0 ? 'negative' : ''}">${p.score < 0 ? '-' : ''}$${Math.abs(p.score)}</div>
          </div>
          <div class="player-controls">
            <button class="btn btn-sm" onclick="adjustScore('${p.id}', ${activeQuestion?.value || 200})" title="+">+</button>
            <button class="btn btn-sm" onclick="adjustScore('${p.id}', -${activeQuestion?.value || 200})" title="-">-</button>
          </div>
        </div>
      `).join('');
    }

    function adjustScore(playerId, delta) {
      socket.emit('adjust-score', { playerId, delta });
    }

    // ==================== SECTION NAV ====================

    function showSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`section-${name}`).classList.add('active');
      document.getElementById(`nav-${name}`).classList.add('active');
    }

    // ==================== SOCKET EVENTS ====================

    socket.on('players-update', (players) => {
      updatePlayerList(players);
    });

    socket.on('player-left', ({ players }) => {
      updatePlayerList(players);
    });

    socket.on('game-started', () => {
      gameState = 'playing';
      document.getElementById('nav-game').disabled = false;
    });

    socket.on('question-active', (q) => {
      showActiveQuestion(q);
      document.getElementById('buzz-order-list').innerHTML = '';
      document.getElementById('buzz-panel').classList.remove('hidden');
    });

    socket.on('dd-revealed', ({ playerName, wager }) => {
      document.getElementById('aq-cat').textContent += ` | ${playerName} — Wager: $${wager}`;
    });

    socket.on('buzz-update', ({ buzzOrder }) => {
      const list = document.getElementById('buzz-order-list');
      list.innerHTML = buzzOrder.map((b, i) => `
        <div style="padding:4px 10px; border-radius:20px; font-size:0.85rem;
          background:${i === 0 ? 'rgba(74,222,128,0.2)' : 'rgba(255,255,255,0.08)'};
          border:1px solid ${i === 0 ? 'rgba(74,222,128,0.5)' : 'rgba(255,255,255,0.15)'};
          color:${i === 0 ? '#4ade80' : 'rgba(255,255,255,0.7)'};">
          ${i + 1}. ${escHtml(b.name)}
        </div>
      `).join('');
    });

    socket.on('answer-correct', ({ players }) => {
      updatePlayerList(players);
    });

    socket.on('answer-wrong', ({ players }) => {
      updatePlayerList(players);
    });

    socket.on('question-closed', () => {
      // Refresh mini board by re-requesting game state
      if (boardData && gameCode) {
        // Mark the question as answered in local boardData too
        if (activeQuestion) {
          const cat = boardData.categories[activeQuestion.catIndex];
          if (cat) cat.questions[activeQuestion.qIndex].answered = true;
        }
      }
      closeQuestionUI();
      renderMiniBoard();
    });

    socket.on('final-jeopardy-started', ({ players }) => {
      gameState = 'final-jeopardy';
      showFJPanel(players);
      document.getElementById('active-q-panel').classList.add('hidden');
    });

    socket.on('fj-wager-received', ({ wageredCount, totalPlayers }) => {
      fjWagerCount = wageredCount;
      document.getElementById('fj-wager-count').textContent = wageredCount;
      document.getElementById('fj-total-players').textContent = totalPlayers;
    });

    socket.on('fj-answer-result', ({ playerId, wager, players }) => {
      updatePlayerList(players);
      const item = document.getElementById(`fj-judge-${playerId}`);
      if (item) {
        const wagerEl = item.querySelector('.fj-judge-wager');
        if (wagerEl) wagerEl.textContent = `Wager: $${wager}`;
      }
    });

    socket.on('game-ended', ({ players }) => {
      gameState = 'ended';
      updatePlayerList(players);
      document.getElementById('fj-host-panel').classList.add('hidden');
      document.getElementById('game-over-panel').classList.remove('hidden');
    });

    socket.on('game-reset', ({ board, players }) => {
      boardData = board;
      updatePlayerList(players);
      document.getElementById('game-over-panel').classList.add('hidden');
      renderMiniBoard();
    });

    // ==================== UTILS ====================

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ==================== INIT ====================

    buildSetupGrid();
  </script>
</body>
</html>
