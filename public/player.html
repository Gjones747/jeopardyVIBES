<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jeopardy! - Player</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { overflow: hidden; }

    .player-page {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .player-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px 16px 16px;
      gap: 14px;
    }

    /* Answer feedback overlay */
    .answer-feedback {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 3rem; font-weight: 700;
      letter-spacing: 0.05em;
      z-index: 100;
      animation: feedbackAnim 0.4s ease-out;
      pointer-events: none;
    }

    .answer-feedback.correct {
      background: rgba(39,174,96,0.95);
      color: white;
    }

    .answer-feedback.wrong {
      background: rgba(192,57,43,0.95);
      color: white;
    }

    .answer-feedback .feedback-sub {
      font-size: 1.2rem;
      font-family: 'Lato', sans-serif;
      margin-top: 8px;
      opacity: 0.8;
    }

    @keyframes feedbackAnim {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .buzz-area {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      padding: 10px 0;
    }

    .others-buzzing {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-style: italic;
      padding: 10px 0;
    }

    .leaderboard {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
  </style>
</head>
<body>

  <!-- Join screen (shown if not yet joined) -->
  <div id="join-screen" class="join-page hidden">
    <div class="page-title" style="font-size:2.5rem;">JEOPARDY!</div>
    <div class="join-card">
      <div>
        <label>Your Name</label>
        <input type="text" id="join-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
      </div>
      <div>
        <label>Room Code</label>
        <input type="text" id="join-code" class="code-input" placeholder="XXXX" maxlength="4" autocomplete="off">
      </div>
      <button class="btn btn-gold btn-lg" onclick="joinGame()" style="width:100%; justify-content:center; margin-top:8px;">
        Join Game
      </button>
      <div id="join-error" style="color:#ff6b6b; font-size:0.85rem; text-align:center;"></div>
    </div>
  </div>

  <!-- Main player view -->
  <div id="player-view" class="player-page hidden">

    <!-- Header -->
    <div class="player-header" style="background:rgba(0,0,0,0.4); border-bottom:1px solid rgba(212,175,55,0.2); padding:10px 16px; flex-shrink:0;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div class="game-title">JEOPARDY!</div>
        <div style="font-size:0.8rem; color:rgba(255,255,255,0.5);">
          Room: <strong id="room-code-display" style="color:var(--gold);"></strong>
        </div>
      </div>
      <div class="player-name-display" id="player-name-header"></div>
    </div>

    <div class="player-main">

      <!-- My score -->
      <div class="player-score-big" style="padding:8px 0;">
        <div class="score-label">Your Score</div>
        <div class="score-value" id="my-score">$0</div>
      </div>

      <!-- Timer bar (shown when question active) -->
      <div id="player-timer-wrap" class="hidden">
        <div class="player-timer-bar-wrap">
          <div class="player-timer-bar" id="player-timer-bar" style="width:100%"></div>
        </div>
        <div class="player-timer-label" id="player-timer-label">30s to buzz in</div>
      </div>

      <!-- Buzz section (only shown when question active) -->
      <div id="buzz-area" class="buzz-area hidden">
        <button class="buzz-btn" id="buzz-btn" onclick="buzzIn()">
          BUZZ!
        </button>
        <div class="buzz-status" id="buzz-status">Tap to buzz in!</div>
      </div>

      <!-- Others buzzing indicator (when someone else buzzed and I haven't / can't) -->
      <div id="others-buzzing" class="others-buzzing hidden">
        <span id="others-buzz-name"></span> is answering...
      </div>

      <!-- Daily Double message (shown when DD is active) -->
      <div id="dd-area" class="hidden" style="text-align:center; padding:14px 0;">
        <div style="font-family:'Oswald',sans-serif; font-size:1.6rem; color:#fbbf24; letter-spacing:0.1em;">DAILY DOUBLE!</div>
        <div style="color:rgba(255,255,255,0.5); font-size:0.85rem; margin-top:6px;">Host is setting the wager...</div>
      </div>

      <!-- Final Jeopardy wager screen -->
      <div id="fj-area" class="hidden" style="padding:10px 0;">
        <div style="font-family:'Oswald',sans-serif; font-size:1.3rem; color:#93c5fd; text-align:center; margin-bottom:8px;">FINAL JEOPARDY</div>
        <div style="font-size:0.9rem; color:rgba(255,255,255,0.6); text-align:center; margin-bottom:6px;" id="fj-cat-display"></div>
        <div id="fj-wager-form">
          <label style="font-size:0.78rem; color:rgba(255,255,255,0.5); display:block; margin-bottom:4px;">Your Wager (max: <span id="fj-max-wager">0</span>)</label>
          <div style="display:flex; gap:8px; align-items:center;">
            <input type="number" id="fj-wager-input" min="0" value="0"
              style="flex:1; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:6px; padding:8px 10px; font-size:1rem;">
            <button class="btn btn-gold" onclick="submitWager()">Lock In</button>
          </div>
        </div>
        <div id="fj-wager-locked" class="hidden" style="text-align:center; padding:10px 0;">
          <div style="font-family:'Oswald',sans-serif; font-size:1.1rem; color:#4ade80;">Wager locked!</div>
          <div style="font-size:0.85rem; color:rgba(255,255,255,0.5); margin-top:4px;">Waiting for clue...</div>
        </div>
        <div id="fj-clue-display" class="hidden" style="margin-top:10px; padding:12px; background:rgba(255,255,255,0.06); border-radius:8px; border:1px solid rgba(255,255,255,0.12);">
          <div style="font-size:0.75rem; color:rgba(255,255,255,0.45); margin-bottom:6px;">FINAL CLUE</div>
          <div style="font-size:0.95rem; color:white; line-height:1.5;" id="fj-clue-text"></div>
        </div>
      </div>

      <!-- Question closed feedback -->
      <div id="waiting-area" style="text-align:center; color:rgba(255,255,255,0.3); font-size:0.9rem; font-style:italic; padding:10px 0;">
        Waiting for next question...
      </div>

      <!-- Leaderboard -->
      <div class="leaderboard">
        <h3>Leaderboard</h3>
        <div id="leaderboard-list">
          <div class="waiting-msg">No players yet...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let myName = '';
    let myId = '';
    let roomCode = '';
    let canBuzz = false;
    let hasBuzzed = false;
    let questionActive = false;
    let iAmFirst = false;
    let playerTimerInterval = null;
    let currentBuzzTimeLimit = 30;
    let currentAnswerTimeLimit = 10;

    function startPlayerTimer(seconds, mode) {
      clearPlayerTimer();
      let timeLeft = seconds;
      const wrap = document.getElementById('player-timer-wrap');
      const bar = document.getElementById('player-timer-bar');
      const label = document.getElementById('player-timer-label');
      wrap.classList.remove('hidden');
      bar.style.width = '100%';
      bar.style.background = mode === 'buzz' ? '#4ade80' : '#fbbf24';
      label.textContent = `${timeLeft}s to ${mode === 'buzz' ? 'buzz in' : 'answer'}`;

      playerTimerInterval = setInterval(() => {
        timeLeft--;
        const pct = Math.max(0, timeLeft / seconds) * 100;
        bar.style.width = pct + '%';
        label.textContent = `${Math.max(0, timeLeft)}s to ${mode === 'buzz' ? 'buzz in' : 'answer'}`;
        if (pct <= 25) bar.style.background = '#ef4444';
        else if (pct <= 50) bar.style.background = '#f97316';
        if (timeLeft <= 0) clearPlayerTimer();
      }, 1000);
    }

    function clearPlayerTimer() {
      clearInterval(playerTimerInterval);
      playerTimerInterval = null;
      document.getElementById('player-timer-wrap').classList.add('hidden');
    }

    // Check URL params
    const urlParams = new URLSearchParams(window.location.search);
    const urlCode = urlParams.get('code');
    const urlName = urlParams.get('name');

    // If came from index with join already done, re-join on this socket
    if (urlCode && urlName) {
      socket.on('connect', () => {
        attemptJoin(urlCode, decodeURIComponent(urlName));
      });
    } else {
      document.getElementById('join-screen').classList.remove('hidden');
      if (urlCode) document.getElementById('join-code').value = urlCode.toUpperCase();
    }

    document.getElementById('join-code')?.addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });

    function joinGame() {
      const name = document.getElementById('join-name').value.trim();
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      const errEl = document.getElementById('join-error');
      if (!name) { errEl.textContent = 'Please enter your name.'; return; }
      if (code.length < 4) { errEl.textContent = 'Please enter the room code.'; return; }
      errEl.textContent = '';
      attemptJoin(code, name);
    }

    function attemptJoin(code, name) {
      socket.emit('join-game', { code, name }, (res) => {
        if (res.error) {
          document.getElementById('join-error').textContent = res.error;
          document.getElementById('join-screen').classList.remove('hidden');
          return;
        }

        myName = res.name;
        myId = socket.id;
        roomCode = code;

        document.getElementById('join-screen').classList.add('hidden');
        document.getElementById('player-view').classList.remove('hidden');
        document.getElementById('player-name-header').textContent = myName;
        document.getElementById('room-code-display').textContent = code;

        // Sync state
        updateLeaderboard(res.game.players);
        updateMyScore(res.game.players);

        if (res.game.state === 'question-active' && res.game.activeQuestion) {
          setQuestionActive(true);
        }
      });
    }

    function buzzIn() {
      if (!canBuzz || hasBuzzed) return;
      socket.emit('buzz-in');
      hasBuzzed = true;
      const btn = document.getElementById('buzz-btn');
      btn.textContent = 'BUZZED!';
      btn.classList.add('buzzed');
      document.getElementById('buzz-status').textContent = 'You buzzed in!';
      document.getElementById('buzz-status').className = 'buzz-status buzzed-first';
    }

    function setQuestionActive(active) {
      questionActive = active;
      canBuzz = active;
      hasBuzzed = false;
      iAmFirst = false;

      const buzzArea = document.getElementById('buzz-area');
      const waitArea = document.getElementById('waiting-area');
      const othersArea = document.getElementById('others-buzzing');
      const btn = document.getElementById('buzz-btn');
      const status = document.getElementById('buzz-status');

      if (active) {
        buzzArea.classList.remove('hidden');
        waitArea.classList.add('hidden');
        othersArea.classList.add('hidden');
        btn.textContent = 'BUZZ!';
        btn.className = 'buzz-btn';
        btn.disabled = false;
        status.textContent = 'Tap to buzz in!';
        status.className = 'buzz-status active';
      } else {
        clearPlayerTimer();
        buzzArea.classList.add('hidden');
        waitArea.classList.remove('hidden');
        othersArea.classList.add('hidden');
      }
    }

    function updateMyScore(players) {
      const me = players.find(p => p.id === socket.id);
      if (!me) return;
      const el = document.getElementById('my-score');
      const score = me.score;
      el.textContent = `${score < 0 ? '-' : ''}$${Math.abs(score)}`;
      el.className = 'score-value' + (score < 0 ? ' negative' : '');
    }

    function updateLeaderboard(players) {
      const list = document.getElementById('leaderboard-list');
      if (!players.length) {
        list.innerHTML = '<div class="waiting-msg">No players yet...</div>';
        return;
      }

      list.innerHTML = players.map((p, i) => {
        const isMe = p.id === socket.id;
        return `
          <div class="leaderboard-item ${isMe ? 'you' : ''}" id="lb-${p.id}">
            <span class="rank">${i + 1}</span>
            <span class="lb-name ${isMe ? 'you-label' : ''}">${escHtml(p.name)}</span>
            <span class="lb-score ${p.score < 0 ? 'negative' : ''}">
              ${p.score < 0 ? '-' : ''}$${Math.abs(p.score)}
            </span>
          </div>
        `;
      }).join('');
    }

    function showFeedback(type, name, value) {
      const el = document.createElement('div');
      el.className = `answer-feedback ${type}`;
      if (type === 'correct') {
        el.innerHTML = `
          <div>${name} is CORRECT!</div>
          <div class="feedback-sub">+$${value}</div>
        `;
      } else {
        el.innerHTML = `
          <div>${name} is wrong</div>
          <div class="feedback-sub">-$${value}</div>
        `;
      }
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }

    // ==================== SOCKET EVENTS ====================

    socket.on('players-update', (players) => {
      updateLeaderboard(players);
      updateMyScore(players);
    });

    socket.on('player-left', ({ players }) => {
      updateLeaderboard(players);
    });

    socket.on('game-started', () => {
      document.getElementById('waiting-area').textContent = 'Game started! Waiting for first question...';
    });

    socket.on('question-active', (q) => {
      currentBuzzTimeLimit = q.buzzTimeLimit || 30;
      currentAnswerTimeLimit = q.answerTimeLimit || 20;

      if (q.dailyDouble) {
        // Hide buzz area, show DD message
        document.getElementById('buzz-area').classList.add('hidden');
        document.getElementById('waiting-area').classList.add('hidden');
        document.getElementById('dd-area').classList.remove('hidden');
        questionActive = false;
        canBuzz = false;
      } else {
        document.getElementById('dd-area').classList.add('hidden');
        setQuestionActive(true);
        startPlayerTimer(currentBuzzTimeLimit, 'buzz');
      }
    });

    socket.on('buzz-update', ({ buzzOrder, firstBuzzerId, firstBuzzerName }) => {
      document.querySelectorAll('.leaderboard-item').forEach(el => el.classList.remove('buzzing-now'));

      if (firstBuzzerId) {
        const el = document.getElementById(`lb-${firstBuzzerId}`);
        if (el) el.classList.add('buzzing-now');
      }

      const iAmFirst = firstBuzzerId === socket.id;
      const iAmInOrder = buzzOrder.some(b => b.id === socket.id);
      const btn = document.getElementById('buzz-btn');
      const status = document.getElementById('buzz-status');
      const othersArea = document.getElementById('others-buzzing');

      // Switch timer to answer countdown for whoever is first
      startPlayerTimer(currentAnswerTimeLimit, 'answer');

      if (iAmFirst) {
        btn.classList.remove('buzzed');
        btn.classList.add('first-buzz');
        btn.textContent = 'YOU\'RE FIRST!';
        btn.disabled = true;
        status.textContent = 'You buzzed first! Answer the question!';
        status.className = 'buzz-status buzzed-first';
        othersArea.classList.add('hidden');
      } else if (!iAmInOrder && firstBuzzerId) {
        if (!hasBuzzed) {
          document.getElementById('others-buzz-name').textContent = firstBuzzerName;
          othersArea.classList.remove('hidden');
        }
      }
    });

    socket.on('answer-correct', ({ playerName, value, players }) => {
      clearPlayerTimer();
      showFeedback('correct', playerName, value);
      updateLeaderboard(players);
      updateMyScore(players);
      document.querySelectorAll('.leaderboard-item').forEach(el => el.classList.remove('buzzing-now'));
    });

    socket.on('answer-wrong', ({ playerName, value, players }) => {
      showFeedback('wrong', playerName, value);
      updateLeaderboard(players);
      updateMyScore(players);

      const btn = document.getElementById('buzz-btn');
      const status = document.getElementById('buzz-status');
      if (!hasBuzzed && questionActive) {
        canBuzz = true;
        btn.className = 'buzz-btn';
        btn.textContent = 'BUZZ!';
        btn.disabled = false;
        status.textContent = 'Tap to buzz in!';
        status.className = 'buzz-status active';
        document.getElementById('others-buzzing').classList.add('hidden');
        // Restart buzz timer for remaining players
        startPlayerTimer(currentBuzzTimeLimit, 'buzz');
      }
      document.querySelectorAll('.leaderboard-item').forEach(el => el.classList.remove('buzzing-now'));
    });

    socket.on('question-closed', () => {
      clearPlayerTimer();
      setQuestionActive(false);
      document.getElementById('dd-area').classList.add('hidden');
      document.querySelectorAll('.leaderboard-item').forEach(el => el.classList.remove('buzzing-now'));
    });

    socket.on('game-reset', ({ players }) => {
      updateLeaderboard(players);
      updateMyScore(players);
      setQuestionActive(false);
      document.getElementById('waiting-area').textContent = 'New game started! Waiting for first question...';
    });

    socket.on('dd-revealed', () => {
      // DD clue is being revealed — hide DD area, show waiting
      document.getElementById('dd-area').classList.add('hidden');
      document.getElementById('waiting-area').classList.remove('hidden');
      document.getElementById('waiting-area').textContent = 'Daily Double — watch the board!';
    });

    socket.on('final-jeopardy-started', ({ category, players }) => {
      // Hide all question UI
      setQuestionActive(false);
      clearPlayerTimer();
      document.getElementById('dd-area').classList.add('hidden');
      document.getElementById('waiting-area').classList.add('hidden');

      // Show FJ area
      const me = players.find(p => p.id === socket.id);
      const myScore = me ? me.score : 0;
      const maxWager = Math.max(0, myScore);

      document.getElementById('fj-cat-display').textContent = category;
      document.getElementById('fj-max-wager').textContent = maxWager;
      document.getElementById('fj-wager-input').max = maxWager;
      document.getElementById('fj-wager-input').value = 0;
      document.getElementById('fj-wager-form').classList.remove('hidden');
      document.getElementById('fj-wager-locked').classList.add('hidden');
      document.getElementById('fj-clue-display').classList.add('hidden');
      document.getElementById('fj-area').classList.remove('hidden');

      updateLeaderboard(players);
      updateMyScore(players);
    });

    function submitWager() {
      const amount = parseInt(document.getElementById('fj-wager-input').value) || 0;
      socket.emit('submit-wager', { amount });
    }

    socket.on('fj-wager-confirmed', ({ wager }) => {
      document.getElementById('fj-wager-form').classList.add('hidden');
      document.getElementById('fj-wager-locked').classList.remove('hidden');
      document.getElementById('fj-wager-locked').querySelector('div').textContent = `Wager locked: $${wager}`;
    });

    socket.on('fj-clue-revealed', ({ clue }) => {
      document.getElementById('fj-wager-form').classList.add('hidden');
      document.getElementById('fj-wager-locked').classList.add('hidden');
      document.getElementById('fj-clue-text').textContent = clue;
      document.getElementById('fj-clue-display').classList.remove('hidden');
    });

    socket.on('fj-answer-result', ({ playerId, correct, wager, newScore, players }) => {
      updateLeaderboard(players);
      updateMyScore(players);
    });

    socket.on('game-ended', ({ players }) => {
      updateLeaderboard(players);
      updateMyScore(players);
      document.getElementById('fj-area').classList.add('hidden');
      document.getElementById('waiting-area').classList.remove('hidden');
      document.getElementById('waiting-area').textContent = 'Game over! Thanks for playing!';
    });

    socket.on('disconnect', () => {
      document.getElementById('waiting-area').textContent = 'Connection lost. Refresh to reconnect.';
    });

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
